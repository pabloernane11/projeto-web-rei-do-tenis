<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rei do Tênis - Carrinho</title>
    <link rel="stylesheet" href="estilo.css" />
  </head>
  <body>
    <img src="img/logo-oficial.png" alt="Logo da marca" id="minha-imagem" />
    <header>
      <h1 class="logo-texto">Rei do Tênis</h1>
      <nav>
        <ul>
          <li><a href="index.html">Início</a></li>
          <li><a href="produtos.html">Produtos</a></li>
          <li><a href="carrinho.html">Carrinho</a></li>
          <li><a href="contato.html">Fale Conosco</a></li>
        </ul>
      </nav>
    </header>

    <main style="padding: 40px; max-width: 900px; margin: 0 auto">
      <h2>Seu Carrinho de Compras</h2>

      <div class="carrinho-container">
        <input type="checkbox" id="remover-item-1" class="hack-remover" />

        <div class="item-carrinho">
          <img
            src="img/Air Jordan 1 High OG.avif"
            alt="Tênis Air Jordan 1 High"
          />

          <div class="info">
            <h3>Tênis Air Jordan 1 High</h3>
            <div class="preco-container">
              <span class="preco-promo">R$ 1.499,99</span>
              <span class="preco-antigo"><del>R$ 1.600,00</del></span>
            </div>
          </div>

          <label for="remover-item-1" class="btn-remover-falso"
            >Remover (X)</label
          >
        </div>
      </div>

      <div
        style="
          text-align: right;
          margin-top: 30px;
          border-top: 3px solid #111111;
          padding-top: 20px;
        "
      >
        <p style="font-size: 18px; margin-bottom: 10px">
          Subtotal: R$ 1.499,99
        </p>
        <h3 style="font-size: 24px; font-weight: 900">TOTAL: R$ 1.499,99</h3>
        <button
          class="btn-comprar"
          style="
            display: inline-block;
            margin-top: 20px;
            border: none;
            cursor: pointer;
            padding: 15px 30px;
          "
        >
          Finalizar Compra
        </button>
      </div>
    </main>
    <footer>
      <p>Desenvolvido por: Pablo Ernane | Gabriel Otone</p>
      <p>E-mail: pablooernanee66@gmail.com</p>
      <p>Telefone: (31) 99999-9999</p>
    </footer>
  </body>
</html>
